name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with PyInstaller
        run: |
          python -m venv build_env
          build_env\Scripts\pip install -r requirements.txt pyinstaller --quiet
          build_env\Scripts\pyinstaller build.spec --noconfirm

      - name: Create zip archive
        run: |
          Compress-Archive -Path "dist/自动阅卷系统/*" -DestinationPath "dist/自动阅卷系统-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/自动阅卷系统-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with PyInstaller
        run: |
          python -m venv build_env
          build_env/bin/pip install -r requirements.txt pyinstaller --quiet
          build_env/bin/pyinstaller build.spec --noconfirm

      - name: Create zip archive
        run: |
          cd dist && zip -r "自动阅卷系统-macOS.zip" "自动阅卷系统/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/自动阅卷系统-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with PyInstaller
        run: |
          python -m venv build_env
          build_env/bin/pip install -r requirements.txt pyinstaller --quiet
          build_env/bin/pyinstaller build.spec --noconfirm

      - name: Create zip archive
        run: |
          cd dist && zip -r "自动阅卷系统-Linux.zip" "自动阅卷系统/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/自动阅卷系统-Linux.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/自动阅卷系统-Windows.zip
            artifacts/macos/自动阅卷系统-macOS.zip
            artifacts/linux/自动阅卷系统-Linux.zip
          generate_release_notes: true
          draft: false
          prerelease: false
